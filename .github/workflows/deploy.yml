# Push to main → build → upload sirf dist/ ka content Hostinger public_html mein
# GitHub repo Secrets mein add karo: FTP_HOST, FTP_USERNAME, FTP_PASSWORD

name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Remove donation image from dist (avoid FTP 550)
        run: |
          rm -f ./dist/images/donation.webp
          rm -f ./dist/images/donationQr.jpeg

      - name: Deploy dist to public_html (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          exclude: |
            **/donation.webp
            **/donationQr.jpeg
